<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Plant Gallery - VedaRoots</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<style>
:root {
  --gd: #1a3a2a; --gm: #2d5a3d; --gl: #4a8c5c; --ga: #6bbf7a; --ga2: #a8ddb5;
  --gold: #c9a84c; --gld: #e8c77a; --cream: #f5f0e8; --crd: #ede5d4;
  --td: #1a2e20; --tm: #3d5c45; --tl: #7a9e82; --white: #fff;
  --sh: 0 8px 32px rgba(26,58,42,.15); --shhv: 0 16px 48px rgba(26,58,42,.25);
  --r: 16px; --rs: 8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--td);overflow-x:hidden;}

/* ===== NAV ===== */
nav{position:fixed;top:0;left:0;right:0;z-index:900;background:rgba(245,240,232,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(107,191,122,.2);height:68px;display:flex;align-items:center;padding:0 2rem;gap:1.5rem;}
.logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;}
.logo-box{width:42px;height:42px;background:var(--gd);border-radius:12px;display:grid;place-items:center;font-size:1.3rem;}
.logo-name{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--gd);}
.logo-name span{color:var(--gold);}
.nav-links{display:flex;gap:1.8rem;list-style:none;margin-left:auto;}
.nav-links a{text-decoration:none;color:var(--tm);font-size:.9rem;font-weight:500;transition:color .2s;padding:.3rem 0;}
.nav-links a:hover,.nav-links a.active{color:var(--ga);}
.nav-btn{background:var(--ga);color:#fff;border:none;padding:.5rem 1.3rem;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:background .2s;}
.nav-btn:hover{background:var(--gl);}

/* ===== MAIN ===== */
.main-container{padding:6rem 2rem 2rem;max-width:1600px;margin:0 auto;}
.page-header{text-align:center;margin-bottom:3rem;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,3rem);font-weight:700;color:var(--gd);margin-bottom:.5rem;}
.page-sub{color:var(--tl);font-size:1.1rem;max-width:600px;margin:0 auto;}

/* ===== SEARCH & FILTERS ===== */
.search-filter-section{background:var(--white);border-radius:var(--r);padding:2rem;box-shadow:var(--sh);margin-bottom:2rem;}
.search-bar{display:flex;gap:1rem;margin-bottom:1.5rem;}
.search-input{flex:1;padding:.8rem 1.2rem;border:1.5px solid var(--crd);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s;background:var(--cream);}
.search-input:focus{border-color:var(--ga);}
.search-btn{background:var(--ga);color:#fff;border:none;padding:.8rem 1.5rem;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:background .2s;}
.search-btn:hover{background:var(--gl);}
.filter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;}
.filter-group{display:flex;flex-direction:column;gap:.5rem;}
.filter-label{font-size:.8rem;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;}
.filter-select{padding:.6rem 1rem;border:1.5px solid var(--crd);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;background:var(--cream);}
.filter-select:focus{border-color:var(--ga);}

/* ===== 3D GALLERY ===== */
.gallery-3d{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:2rem;margin-bottom:2rem;}
.plant-3d-card{background:var(--white);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);transition:all .3s;border:1px solid transparent;cursor:pointer;position:relative;aspect-ratio:1;}
.plant-3d-card:hover{transform:translateY(-8px);box-shadow:var(--shhv);border-color:var(--ga2);}
.plant-3d-canvas{width:100%;height:200px;display:block;background:linear-gradient(135deg,var(--gd),var(--gm));}
.plant-3d-info{padding:1.5rem;}
.plant-3d-header{display:flex;align-items:center;gap:1rem;margin-bottom:1rem;}
.plant-3d-image-container{flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.plant-3d-image{width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid rgba(26,58,42,0.2);}
.plant-3d-emoji{font-size:2.5rem;display:flex;align-items:center;justify-content:center;width:50px;height:50px;}
.plant-3d-name{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:var(--gd);flex:1;}
.plant-3d-bot{font-size:.85rem;color:var(--tl);font-style:italic;}
.plant-3d-tags{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;}
.plant-3d-tag{font-size:.7rem;padding:.2rem .6rem;border-radius:50px;font-weight:600;}
.plant-3d-tag.a{background:#e8f5e9;color:#2e7d32;}
.plant-3d-tag.b{background:#fff8e1;color:#e65100;}
.plant-3d-tag.c{background:#e8eaf6;color:#283593;}
.plant-3d-actions{display:flex;gap:.5rem;}
.plant-3d-btn{flex:1;padding:.6rem;border:1.5px solid var(--crd);border-radius:var(--rs);background:var(--cream);font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;color:var(--td);text-align:center;}
.plant-3d-btn:hover{border-color:var(--ga);background:rgba(107,191,122,.1);}
.plant-3d-btn.primary{background:var(--ga);color:#fff;border-color:var(--ga);}
.plant-3d-btn.primary:hover{background:var(--gl);}

/* ===== LOADING ===== */
.loading{text-align:center;padding:3rem;color:var(--tl);}
.loading-spinner{width:40px;height:40px;border:3px solid var(--crd);border-top:3px solid var(--ga);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1rem;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}

/* ===== HOVER EFFECT ===== */
.plant-3d-card::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(107,191,122,.1);opacity:0;transition:opacity .3s;z-index:1;}
.plant-3d-card:hover::before{opacity:1;}

/* ===== PAGINATION ===== */
.pagination{display:flex;justify-content:center;align-items:center;gap:.5rem;margin-top:2rem;}
.page-btn{padding:.6rem 1rem;border:1.5px solid var(--crd);border-radius:var(--rs);background:var(--white);font-family:'DM Sans',sans-serif;font-size:.9rem;cursor:pointer;transition:all .2s;color:var(--td);}
.page-btn:hover:not(:disabled){border-color:var(--ga);background:rgba(107,191,122,.1);}
.page-btn.active{background:var(--ga);color:#fff;border-color:var(--ga);}
.page-btn:disabled{opacity:.5;cursor:not-allowed;}

@media(max-width:768px){
  .nav-links{display:none;}
  .gallery-3d{grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem;}
  .filter-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- ===== NAV ===== -->
<nav>
  <a class="logo" href="/">
    <div class="logo-box">🌿</div>
    <span class="logo-name">Veda<span>Roots</span></span>
  </a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/plants.html">Plants</a></li>
    <li><a href="/3d-gallery.html" class="active">🎮 3D Gallery</a></li>
    <li><a href="/chatbot.html">🤖 AI Assistant</a></li>
    <li><a href="/#about">About</a></li>
  </ul>
  <button class="nav-btn" onclick="window.location.href='/'">← Back to Home</button>
</nav>

<!-- ===== MAIN ===== -->
<div class="main-container">
  <div class="page-header">
    <h1 class="page-title">🎮 3D Plant Gallery</h1>
    <p class="page-sub">Explore our complete collection of Ayurvedic plants in interactive 3D models</p>
  </div>

  <!-- ===== SEARCH & FILTERS ===== -->
  <div class="search-filter-section">
    <div class="search-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="Search 3D plants by name, botanical name, or uses...">
      <button class="search-btn" onclick="searchPlants()">🔍 Search</button>
    </div>
    
    <div class="filter-grid">
      <div class="filter-group">
        <label class="filter-label">AYUSH System</label>
        <select class="filter-select" id="ayushFilter" onchange="filterPlants()">
          <option value="">All Systems</option>
          <option value="Ayurveda">Ayurveda</option>
          <option value="Siddha">Siddha</option>
          <option value="Unani">Unani</option>
          <option value="Homeopathy">Homeopathy</option>
        </select>
      </div>
      
      <div class="filter-group">
        <label class="filter-label">Plant Type</label>
        <select class="filter-select" id="typeFilter" onchange="filterPlants()">
          <option value="">All Types</option>
          <option value="Herb">Herb</option>
          <option value="Tree">Tree</option>
          <option value="Shrub">Shrub</option>
          <option value="Climber">Climber</option>
          <option value="Succulent">Succulent</option>
          <option value="Grass">Grass</option>
        </select>
      </div>
      
      <div class="filter-group">
        <label class="filter-label">Therapeutic Category</label>
        <select class="filter-select" id="categoryFilter" onchange="filterPlants()">
          <option value="">All Categories</option>
          <option value="Digestive">Digestive</option>
          <option value="Respiratory">Respiratory</option>
          <option value="Skin">Skin</option>
          <option value="Immunity">Immunity</option>
          <option value="Anti-inflammatory">Anti-inflammatory</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ===== 3D GALLERY ===== -->
  <div class="gallery-3d" id="gallery3d">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>Loading 3D plant models...</p>
    </div>
  </div>

  <!-- ===== PAGINATION ===== -->
  <div class="pagination" id="pagination"></div>
</div>

<script>
let allPlants = [];
let filteredPlants = [];
let currentPage = 1;
const plantsPerPage = 12;
let plant3DScenes = {};

// Load plants from API
async function loadPlants() {
  try {
    const response = await fetch('/api/plants');
    allPlants = await response.json();
    filteredPlants = [...allPlants];
    renderGallery();
    renderPagination();
    initialize3DModels();
  } catch (error) {
    console.error('Error loading plants:', error);
    document.getElementById('gallery3d').innerHTML = '<p style="text-align:center;color:red;">Error loading plants. Please try again.</p>';
  }
}

// Search plants
function searchPlants() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  filteredPlants = allPlants.filter(plant => 
    plant.name.toLowerCase().includes(query) ||
    plant.botanical_name.toLowerCase().includes(query) ||
    plant.uses.toLowerCase().includes(query) ||
    plant.category.toLowerCase().includes(query)
  );
  currentPage = 1;
  renderGallery();
  renderPagination();
}

// Filter plants
function filterPlants() {
  const ayushFilter = document.getElementById('ayushFilter').value;
  const typeFilter = document.getElementById('typeFilter').value;
  const categoryFilter = document.getElementById('categoryFilter').value;
  const searchQuery = document.getElementById('searchInput').value.toLowerCase();
  
  filteredPlants = allPlants.filter(plant => {
    const matchesSearch = !searchQuery || 
      plant.name.toLowerCase().includes(searchQuery) ||
      plant.botanical_name.toLowerCase().includes(searchQuery) ||
      plant.uses.toLowerCase().includes(searchQuery) ||
      plant.category.toLowerCase().includes(searchQuery);
    
    const matchesAyush = !ayushFilter || plant.ayush_system === ayushFilter;
    const matchesType = !typeFilter || plant.category === typeFilter;
    const matchesCategory = !categoryFilter || plant.category === categoryFilter;
    
    return matchesSearch && matchesAyush && matchesType && matchesCategory;
  });
  
  currentPage = 1;
  renderGallery();
  renderPagination();
}

// Render 3D gallery
function renderGallery() {
  const gallery = document.getElementById('gallery3d');
  const start = (currentPage - 1) * plantsPerPage;
  const end = start + plantsPerPage;
  const plantsToShow = filteredPlants.slice(start, end);
  
  if (plantsToShow.length === 0) {
    gallery.innerHTML = '<p style="text-align:center;color:var(--tl);grid-column:1/-1;">No plants found matching your criteria.</p>';
    return;
  }
  
  gallery.innerHTML = plantsToShow.map(plant => `
    <div class="plant-3d-card" onclick="view3DModel(${plant.id})">
      <canvas class="plant-3d-canvas" id="canvas-${plant.id}"></canvas>
      <div class="plant-3d-info">
        <div class="plant-3d-header">
          <div class="plant-3d-image-container">
            ${plant.image && !plant.image.startsWith('🌿') && !plant.image.startsWith('🌰') ? 
              `<img src="${plant.image}" alt="${plant.name}" class="plant-3d-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
               <div class="plant-3d-emoji" style="display:none;">${plant.emoji || '🌿'}</div>` :
              `<div class="plant-3d-emoji">${plant.emoji || '🌿'}</div>`
            }
          </div>
          <div>
            <div class="plant-3d-name">${plant.name}</div>
            <div class="plant-3d-bot">${plant.botanical_name}</div>
          </div>
        </div>
        <div class="plant-3d-tags">
          <span class="plant-3d-tag a">${plant.ayush_system}</span>
          <span class="plant-3d-tag b">${plant.plant_type}</span>
          <span class="plant-3d-tag c">${plant.category}</span>
        </div>
        <div class="plant-3d-actions">
          <button class="plant-3d-btn primary" onclick="event.stopPropagation(); view3DModel(${plant.id})">🎮 View 3D</button>
          <button class="plant-3d-btn" onclick="event.stopPropagation(); viewDetails(${plant.id})">📊 Details</button>
        </div>
      </div>
    </div>
  `).join('');
}

// Render pagination
function renderPagination() {
  const totalPages = Math.ceil(filteredPlants.length / plantsPerPage);
  const pagination = document.getElementById('pagination');
  
  if (totalPages <= 1) {
    pagination.innerHTML = '';
    return;
  }
  
  let html = '';
  
  // Previous button
  html += `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>←</button>`;
  
  // Page numbers
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
      html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
    } else if (i === currentPage - 3 || i === currentPage + 3) {
      html += '<span style="padding: 0 0.5rem;">...</span>';
    }
  }
  
  // Next button
  html += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>→</button>`;
  
  pagination.innerHTML = html;
}

// Change page
function changePage(page) {
  const totalPages = Math.ceil(filteredPlants.length / plantsPerPage);
  if (page < 1 || page > totalPages) return;
  
  currentPage = page;
  renderGallery();
  renderPagination();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Initialize 3D models in gallery
function initialize3DModels() {
  setTimeout(() => {
    document.querySelectorAll('.plant-3d-canvas').forEach(canvas => {
      const plantId = parseInt(canvas.id.replace('canvas-', ''));
      createMini3DModel(canvas, plantId);
    });
  }, 100);
}

// Create mini 3D model for gallery
function createMini3DModel(canvas, plantId) {
  const plant = allPlants.find(p => p.id === plantId);
  if (!plant) return;

  // Create mini Three.js scene
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x2d5a3d);
  
  const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
  camera.position.set(0, 1, 3);
  
  const renderer = new THREE.WebGLRenderer({ 
    canvas: canvas,
    antialias: true,
    alpha: true
  });
  renderer.setSize(300, 200);
  renderer.setPixelRatio(window.devicePixelRatio);
  
  // Lighting
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);
  
  const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
  directionalLight.position.set(2, 4, 2);
  scene.add(directionalLight);
  
  // Load actual GLB model
  const loader = new THREE.GLTFLoader();
  
  loader.load(
    plant.model,
    function (gltf) {
      const model = gltf.scene;
      
      // Position and scale the model for mini view
      model.position.set(0, 0, 0);
      model.scale.set(0.5, 0.5, 0.5);
      
      // Enable shadows
      model.traverse(function (child) {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
      
      scene.add(model);
      
      // Start animation
      animateMiniModel(scene, camera, renderer, model);
    },
    function (xhr) {
      // Loading progress
      console.log('Loading mini model for plant', plantId);
    },
    function (error) {
      console.error('Error loading mini model:', error);
      
      // Fallback to placeholder
      createPlaceholderMiniModel(scene, plant);
      
      // Start animation
      animateMiniModel(scene, camera, renderer, scene.children[scene.children.length - 1]);
    }
  );
}

// Create placeholder mini model
function createPlaceholderMiniModel(scene, plant) {
  const group = new THREE.Group();
  
  // Stem
  const stemGeometry = new THREE.CylinderGeometry(0.05, 0.08, 1.5, 8);
  const stemMaterial = new THREE.MeshStandardMaterial({ color: 0x2d5016 });
  const stem = new THREE.Mesh(stemGeometry, stemMaterial);
  stem.position.y = 0.75;
  group.add(stem);
  
  // Leaves
  for (let i = 0; i < 6; i++) {
    const leafGeometry = new THREE.SphereGeometry(0.15, 6, 6);
    const leafMaterial = new THREE.MeshStandardMaterial({ color: 0x4a7c59 });
    const leaf = new THREE.Mesh(leafGeometry, leafMaterial);
    
    const angle = (i / 6) * Math.PI * 2;
    const height = 0.5 + Math.random() * 1;
    leaf.position.set(
      Math.cos(angle) * 0.4,
      height,
      Math.sin(angle) * 0.4
    );
    leaf.scale.set(1, 0.3, 1);
    group.add(leaf);
  }
  
  // Add flowers for specific plants
  if (plant.name === 'Tulsi') {
    for (let i = 0; i < 3; i++) {
      const flowerGeometry = new THREE.SphereGeometry(0.1, 8, 8);
      const flowerMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
      const flower = new THREE.Mesh(flowerGeometry, flowerMaterial);
      
      const angle = (i / 3) * Math.PI * 2;
      flower.position.set(
        Math.cos(angle) * 0.25,
        1.6,
        Math.sin(angle) * 0.25
      );
      group.add(flower);
    }
  }
  
  scene.add(group);
  
  // Animation
  function animate() {
    requestAnimationFrame(animate);
    group.rotation.y += 0.01;
    renderer.render(scene, camera);
  }
  
  animate();
  
  // Store reference
  plant3DScenes[plantId] = { scene, camera, renderer, group };
}

// View 3D model
function view3DModel(plantId) {
  window.open(`/3d-viewer.html?id=${plantId}`, '_blank');
}

// View details
function viewDetails(plantId) {
  window.open(`/plants.html?id=${plantId}`, '_blank');
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', () => {
  loadPlants();
  
  // Add search on Enter key
  document.getElementById('searchInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      searchPlants();
    }
  });
});
</script>
</body>
</html>
