<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Plant Viewer - VedaRoots</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<style>
:root {
  --gd: #1a3a2a; --gm: #2d5a3d; --gl: #4a8c5c; --ga: #6bbf7a; --ga2: #a8ddb5;
  --gold: #c9a84c; --gld: #e8c77a; --cream: #f5f0e8; --crd: #ede5d4;
  --td: #1a2e20; --tm: #3d5c45; --tl: #7a9e82; --white: #fff;
  --sh: 0 8px 32px rgba(26,58,42,.15); --shhv: 0 16px 48px rgba(26,58,42,.25);
  --r: 16px; --rs: 8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--td);overflow:hidden;}

/* ===== NAV ===== */
nav{position:fixed;top:0;left:0;right:0;z-index:900;background:rgba(245,240,232,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(107,191,122,.2);height:68px;display:flex;align-items:center;padding:0 2rem;gap:1.5rem;}
.logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;}
.logo-box{width:42px;height:42px;background:var(--gd);border-radius:12px;display:grid;place-items:center;font-size:1.3rem;}
.logo-name{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--gd);}
.logo-name span{color:var(--gold);}
.nav-btn{background:var(--ga);color:#fff;border:none;padding:.5rem 1.3rem;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:background .2s;margin-left:auto;}
.nav-btn:hover{background:var(--gl);}

/* ===== 3D VIEWER ===== */
.viewer-container{position:fixed;top:68px;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1a3a2a 0%,#2d5a3d 50%,#1a3a2a 100%);}
.viewer-canvas{width:100%;height:100%;display:block;}

/* ===== CONTROLS PANEL ===== */
.controls-panel{position:fixed;top:80px;right:20px;width:300px;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-radius:var(--r);box-shadow:var(--shhv);padding:1.5rem;z-index:100;}
.plant-info{text-align:center;margin-bottom:1.5rem;}
.plant-emoji{font-size:3rem;margin-bottom:.5rem;}
.plant-name{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--gd);margin-bottom:.3rem;}
.plant-bot{font-size:.85rem;color:var(--tl);font-style:italic;}

.control-group{margin-bottom:1.5rem;}
.control-label{font-size:.8rem;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.8rem;display:block;}
.control-buttons{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem;}
.control-btn{background:var(--ga);color:#fff;border:none;padding:.6rem;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;}
.control-btn:hover{background:var(--gl);transform:translateY(-1px);}
.control-btn.full-width{grid-column:span 2;}

.slider-control{margin-bottom:1rem;}
.slider{width:100%;height:6px;border-radius:3px;background:var(--crd);outline:none;-webkit-appearance:none;}
.slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:var(--ga);cursor:pointer;}
.slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--ga);cursor:pointer;border:none;}

/* ===== LOADING ===== */
.loading-overlay{position:fixed;top:68px;left:0;right:0;bottom:0;background:var(--gd);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;}
.loading-spinner{width:60px;height:60px;border:4px solid rgba(107,191,122,.3);border-top:4px solid var(--ga);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:1rem;}
.loading-text{color:#fff;font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}

/* ===== INFO PANEL ===== */
.info-panel{position:fixed;top:80px;left:20px;width:280px;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-radius:var(--r);box-shadow:var(--shhv);padding:1.5rem;z-index:100;}
.info-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;color:var(--gd);margin-bottom:1rem;}
.info-item{margin-bottom:1rem;}
.info-label{font-size:.8rem;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;}
.info-text{font-size:.9rem;color:var(--td);line-height:1.5;}

/* ===== VIEW MODES ===== */
.view-modes{display:flex;gap:.5rem;margin-bottom:1rem;}
.view-mode{flex:1;padding:.5rem;border:1px solid var(--crd);background:var(--white);border-radius:var(--rs);font-size:.75rem;cursor:pointer;transition:all .2s;text-align:center;}
.view-mode.active{background:var(--ga);color:#fff;border-color:var(--ga);}

@media(max-width:768px){
  .controls-panel{right:10px;width:250px;top:70px;}
  .info-panel{left:10px;width:250px;top:70px;}
}
</style>
</head>
<body>

<!-- ===== NAV ===== -->
<nav>
  <a class="logo" href="/">
    <div class="logo-box">🌿</div>
    <span class="logo-name">Veda<span>Roots</span></span>
  </a>
  <button class="nav-btn" onclick="window.location.href='/plants.html'">← Back to Plants</button>
</nav>

<!-- ===== LOADING OVERLAY ===== -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading 3D Plant Model...</div>
</div>

<!-- ===== 3D VIEWER ===== -->
<div class="viewer-container">
  <canvas id="viewerCanvas" class="viewer-canvas"></canvas>
</div>

<!-- ===== INFO PANEL ===== -->
<div class="info-panel" id="infoPanel" style="display: none;">
  <h3 class="info-title">🌿 Plant Information</h3>
  <div class="info-item">
    <div class="info-label">Botanical Name</div>
    <div class="info-text" id="botanicalName">-</div>
  </div>
  <div class="info-item">
    <div class="info-label">Family</div>
    <div class="info-text" id="plantFamily">-</div>
  </div>
  <div class="info-item">
    <div class="info-label">AYUSH System</div>
    <div class="info-text" id="ayushSystem">-</div>
  </div>
  <div class="info-item">
    <div class="info-label">Medicinal Uses</div>
    <div class="info-text" id="medicinalUses">-</div>
  </div>
</div>

<!-- ===== CONTROLS PANEL ===== -->
<div class="controls-panel" id="controlsPanel">
  <div class="plant-info">
    <div class="plant-emoji" id="plantEmoji">🌿</div>
    <h2 class="plant-name" id="plantName">Loading...</h2>
    <p class="plant-bot" id="plantBotanical">-</p>
  </div>

  <div class="control-group">
    <label class="control-label">View Mode</label>
    <div class="view-modes">
      <div class="view-mode active" onclick="setViewMode('rotate')">🔄 Rotate</div>
      <div class="view-mode" onclick="setViewMode('pan')">✋ Pan</div>
      <div class="view-mode" onclick="setViewMode('zoom')">🔍 Zoom</div>
    </div>
  </div>

  <div class="control-group">
    <label class="control-label">Model Controls</label>
    <div class="control-buttons">
      <button class="control-btn" onclick="resetCamera()">🎯 Reset View</button>
      <button class="control-btn" onclick="toggleAutoRotate()">🔄 Auto Rotate</button>
      <button class="control-btn" onclick="toggleWireframe()">📐 Wireframe</button>
      <button class="control-btn" onclick="takeScreenshot()">📸 Screenshot</button>
    </div>
  </div>

  <div class="control-group">
    <label class="control-label">Lighting</label>
    <div class="slider-control">
      <input type="range" class="slider" id="lightIntensity" min="0" max="2" step="0.1" value="1" oninput="updateLighting(this.value)">
    </div>
    <div class="control-buttons">
      <button class="control-btn" onclick="setLightingPreset('bright')">☀️ Bright</button>
      <button class="control-btn" onclick="setLightingPreset('soft')">🌤 Soft</button>
      <button class="control-btn" onclick="setLightingPreset('dramatic')">🎭 Dramatic</button>
    </div>
  </div>

  <div class="control-group">
    <label class="control-label">Actions</label>
    <div class="control-buttons">
      <button class="control-btn full-width" onclick="toggleInfoPanel()">📊 Show Details</button>
      <button class="control-btn full-width" onclick="shareModel()">📤 Share Model</button>
    </div>
  </div>
</div>

<script>
// Three.js variables
let scene, camera, renderer, controls, model;
let currentViewMode = 'rotate';
let autoRotate = false;
let directionalLight, ambientLight;

// Plant data (from URL or default)
const urlParams = new URLSearchParams(window.location.search);
const plantId = urlParams.get('id') || 1;

// Load plant data from the same structure as index.html
const plantData = {
  1: { 
    name: 'Tulsi', 
    botanical_name: 'Ocimum sanctum', 
    emoji: '🌿', 
    family: 'Lamiaceae', 
    ayush_system: 'Ayurveda', 
    uses: 'Boosts immunity, treats cold, cough, fever, stress. Acts as adaptogen and antibacterial agent. Useful in respiratory disorders and skin diseases.',
    model: '/static/models/tulsi.glb'
  },
  2: { 
    name: 'Ashwagandha', 
    botanical_name: 'Withania somnifera', 
    emoji: '🌰', 
    family: 'Solanaceae', 
    ayush_system: 'Ayurveda', 
    uses: 'Reduces anxiety and stress, improves energy, stamina and concentration. Used in managing inflammation and arthritis pain. Enhances male fertility.',
    model: '/static/models/ashwagandha.glb'
  },
  3: { 
    name: 'Neem', 
    botanical_name: 'Azadirachta indica', 
    emoji: '🌳', 
    family: 'Meliaceae', 
    ayush_system: 'Ayurveda', 
    uses: 'Treats skin diseases, acne, eczema, and fungal infections. Acts as natural insecticide and antiseptic. Purifies blood and improves liver function.',
    model: '/static/models/neem.glb'
  },
  4: { 
    name: 'Turmeric', 
    botanical_name: 'Curcuma longa', 
    emoji: '🌶', 
    family: 'Zingiberaceae', 
    ayush_system: 'Ayurveda', 
    uses: 'Powerful anti-inflammatory and antioxidant. Helps in joint pain, arthritis, digestive problems, and wound healing. Curcumin shown to reduce cancer risk.',
    model: '/static/models/turmeric.glb'
  },
  5: { 
    name: 'Aloe Vera', 
    botanical_name: 'Aloe barbadensis miller', 
    emoji: '🌱', 
    family: 'Asphodelaceae', 
    ayush_system: 'Ayurveda', 
    uses: 'Treats burns, skin irritation, acne, and wounds. Improves digestion and relieves constipation. Lowers blood sugar in diabetics.',
    model: '/static/models/aloe_vera.glb'
  },
  6: { 
    name: 'Giloy', 
    botanical_name: 'Tinospora cordifolia', 
    emoji: '�', 
    family: 'Menispermaceae', 
    ayush_system: 'Ayurveda', 
    uses: 'Potent immunomodulator and anti-pyretic. Treats chronic fever, dengue, malaria. Reduces blood sugar and uric acid. Detoxifies the body.',
    model: '/static/models/giloy.glb'
  },
  7: { 
    name: 'Shatavari', 
    botanical_name: 'Asparagus racemosus', 
    emoji: '🌱', 
    family: 'Asparagaceae', 
    ayush_system: 'Ayurveda', 
    uses: 'Supports female reproductive health, enhances lactation, balances hormones. Boosts immunity and digestion. Acts as adaptogen and anti-stress agent.',
    model: '/static/models/shatavari.glb'
  },
  8: { 
    name: 'Brahmi', 
    botanical_name: 'Bacopa monnieri', 
    emoji: '🌿', 
    family: 'Plantaginaceae', 
    ayush_system: 'Ayurveda', 
    uses: 'Enhances memory and cognitive function. Reduces anxiety, depression and mental fatigue. Treats epilepsy and neurological disorders. Used in ADHD management.',
    model: '/static/models/brahmi.glb'
  },
  9: { 
    name: 'Karela', 
    botanical_name: 'Momordica charantia', 
    emoji: '🌶', 
    family: 'Cucurbitaceae', 
    ayush_system: 'Siddha', 
    uses: 'Excellent hypoglycaemic agent - controls blood sugar in Type 2 diabetes. Treats skin diseases, liver problems, and parasitic infections. Boosts immunity.',
    model: '/static/models/karela.glb'
  },
  10: { 
    name: 'Arjuna', 
    botanical_name: 'Terminalia arjuna', 
    emoji: '🌳', 
    family: 'Combretaceae', 
    ayush_system: 'Ayurveda', 
    uses: 'Strengthens heart muscles, treats hypertension, angina, and congestive heart failure. Anti-inflammatory and astringent properties. Useful in respiratory disorders.',
    model: '/static/models/arjuna.glb'
  }
};

const currentPlant = plantData[plantId] || plantData[1];

// Initialize Three.js scene
function init() {
  // Scene setup
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a3a2a);
  scene.fog = new THREE.Fog(0x1a3a2a, 10, 50);

  // Camera setup
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 2, 5);

  // Renderer setup
  renderer = new THREE.WebGLRenderer({ 
    canvas: document.getElementById('viewerCanvas'),
    antialias: true,
    alpha: true
  });
  renderer.setSize(window.innerWidth, window.innerHeight - 68);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1;

  // Controls setup
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.minDistance = 1;
  controls.maxDistance = 20;
  controls.maxPolarAngle = Math.PI / 2;

  // Lighting setup
  ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);

  directionalLight = new THREE.DirectionalLight(0xffffff, 1);
  directionalLight.position.set(5, 10, 5);
  directionalLight.castShadow = true;
  directionalLight.shadow.mapSize.width = 2048;
  directionalLight.shadow.mapSize.height = 2048;
  directionalLight.shadow.camera.near = 0.5;
  directionalLight.shadow.camera.far = 50;
  directionalLight.shadow.camera.left = -10;
  directionalLight.shadow.camera.right = 10;
  directionalLight.shadow.camera.top = 10;
  directionalLight.shadow.camera.bottom = -10;
  scene.add(directionalLight);

  // Add ground plane
  const groundGeometry = new THREE.PlaneGeometry(20, 20);
  const groundMaterial = new THREE.MeshStandardMaterial({ 
    color: 0x2d5a3d,
    roughness: 0.8,
    metalness: 0.2
  });
  const ground = new THREE.Mesh(groundGeometry, groundMaterial);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Load plant model
  loadPlantModel();

  // Update UI
  updatePlantInfo();

  // Start animation loop
  animate();

  // Hide loading overlay
  setTimeout(() => {
    document.getElementById('loadingOverlay').style.display = 'none';
  }, 2000);
}

// Load 3D plant model
function loadPlantModel() {
  // Remove existing model
  if (model) {
    scene.remove(model);
  }

  // Load actual GLB model
  const loader = new THREE.GLTFLoader();
  
  loader.load(
    currentPlant.model,
    function (gltf) {
      model = gltf.scene;
      
      // Position and scale the model
      model.position.set(0, 0, 0);
      model.scale.set(1, 1, 1);
      
      // Enable shadows
      model.traverse(function (child) {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
      
      scene.add(model);
      
      // Hide loading overlay
      document.getElementById('loadingOverlay').style.display = 'none';
    },
    function (xhr) {
      // Loading progress
      const percent = (xhr.loaded / xhr.total) * 100;
      console.log('Model loading: ' + percent + '%');
    },
    function (error) {
      console.error('Error loading model:', error);
      
      // Fallback to placeholder if model fails to load
      createPlaceholderModel();
      
      // Hide loading overlay
      document.getElementById('loadingOverlay').style.display = 'none';
    }
  );
}

// Create placeholder model as fallback
function createPlaceholderModel() {
  const group = new THREE.Group();

  // Stem
  const stemGeometry = new THREE.CylinderGeometry(0.1, 0.15, 3, 8);
  const stemMaterial = new THREE.MeshStandardMaterial({ color: 0x2d5016 });
  const stem = new THREE.Mesh(stemGeometry, stemMaterial);
  stem.position.y = 1.5;
  stem.castShadow = true;
  group.add(stem);

  // Leaves
  for (let i = 0; i < 8; i++) {
    const leafGeometry = new THREE.SphereGeometry(0.3, 6, 6);
    const leafMaterial = new THREE.MeshStandardMaterial({ color: 0x4a7c59 });
    const leaf = new THREE.Mesh(leafGeometry, leafMaterial);
    
    const angle = (i / 8) * Math.PI * 2;
    const height = 1 + Math.random() * 2;
    leaf.position.set(
      Math.cos(angle) * 0.8,
      height,
      Math.sin(angle) * 0.8
    );
    leaf.scale.set(1, 0.3, 1.5);
    leaf.castShadow = true;
    group.add(leaf);
  }

  // Flowers (if Tulsi)
  if (currentPlant.name === 'Tulsi') {
    for (let i = 0; i < 4; i++) {
      const flowerGeometry = new THREE.SphereGeometry(0.2, 8, 8);
      const flowerMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
      const flower = new THREE.Mesh(flowerGeometry, flowerMaterial);
      
      const angle = (i / 4) * Math.PI * 2;
      flower.position.set(
        Math.cos(angle) * 0.5,
        3.2,
        Math.sin(angle) * 0.5
      );
      flower.castShadow = true;
      group.add(flower);
    }
  }

  model = group;
  scene.add(model);
}

// Update plant information in UI
function updatePlantInfo() {
  document.getElementById('plantEmoji').textContent = currentPlant.emoji;
  document.getElementById('plantName').textContent = currentPlant.name;
  document.getElementById('plantBotanical').textContent = currentPlant.botanical_name;
  document.getElementById('botanicalName').textContent = currentPlant.botanical_name;
  document.getElementById('plantFamily').textContent = currentPlant.family;
  document.getElementById('ayushSystem').textContent = currentPlant.ayush_system;
  document.getElementById('medicinalUses').textContent = currentPlant.uses;
}

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  // Auto rotation
  if (autoRotate && model) {
    model.rotation.y += 0.005;
  }

  controls.update();
  renderer.render(scene, camera);
}

// Control functions
function setViewMode(mode) {
  currentViewMode = mode;
  document.querySelectorAll('.view-mode').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');

  switch(mode) {
    case 'rotate':
      controls.enableRotate = true;
      controls.enablePan = false;
      break;
    case 'pan':
      controls.enableRotate = false;
      controls.enablePan = true;
      break;
    case 'zoom':
      controls.enableRotate = false;
      controls.enablePan = false;
      break;
  }
}

function resetCamera() {
  camera.position.set(0, 2, 5);
  controls.reset();
}

function toggleAutoRotate() {
  autoRotate = !autoRotate;
  event.target.textContent = autoRotate ? '⏸ Stop Rotate' : '🔄 Auto Rotate';
}

function toggleWireframe() {
  if (model) {
    model.traverse((child) => {
      if (child.isMesh) {
        child.material.wireframe = !child.material.wireframe;
      }
    });
  }
}

function updateLighting(value) {
  directionalLight.intensity = parseFloat(value);
}

function setLightingPreset(preset) {
  switch(preset) {
    case 'bright':
      ambientLight.intensity = 0.6;
      directionalLight.intensity = 1.5;
      document.getElementById('lightIntensity').value = 1.5;
      break;
    case 'soft':
      ambientLight.intensity = 0.3;
      directionalLight.intensity = 0.8;
      document.getElementById('lightIntensity').value = 0.8;
      break;
    case 'dramatic':
      ambientLight.intensity = 0.1;
      directionalLight.intensity = 2;
      document.getElementById('lightIntensity').value = 2;
      break;
  }
}

function toggleInfoPanel() {
  const panel = document.getElementById('infoPanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  event.target.textContent = panel.style.display === 'none' ? '📊 Show Details' : '📊 Hide Details';
}

function takeScreenshot() {
  renderer.render(scene, camera);
  const link = document.createElement('a');
  link.download = currentPlant.name + '_3d_model.png';
  link.href = renderer.domElement.toDataURL();
  link.click();
}

function shareModel() {
  const url = window.location.href;
  navigator.clipboard.writeText(url);
  alert('Model link copied to clipboard!');
}

// Handle window resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / (window.innerHeight - 68);
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight - 68);
});

// Initialize on load
window.addEventListener('load', init);
</script>
</body>
</html>
